server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webflux:
          globalcors:
            corsConfigurations:
              '[/**]':
                allowedOrigins:
                  - "http://localhost:5173"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - OPTIONS
                allowedHeaders:
                  - "*"
                allowCredentials: true

          routes:
            - id: auth-service
              uri: lb://AUTH-SERVICE
              predicates:
                - Path=/api/auth/**

            - id: user-service
              uri: lb://USER-SERVICE
              predicates:
                - Path=/api/users/**

            - id: task-service
              uri: lb://TASK-SERVICE
              predicates:
                - Path=/api/tasks/**

            - id: note-service
              uri: lb://NOTE-SERVICE
              predicates:
                - Path=/api/notes/**

            - id: snippet-service
              uri: lb://SNIPPET-SERVICE
              predicates:
                - Path=/api/snippets/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

jwt:
  secret: YourVeryLongSecretKeyForDevFlowAuthenticationProject123456789
  expiration: 3600000